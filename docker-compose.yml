services:
  pipeline:
    build: .
    command: python marketlens/flows/pipeline_flow.py
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - pipeline
    restart: unless-stopped
