marketlens:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Path is relative to where `dbt` is invoked (the dbt/ directory).
      # Run dbt from the project root via `make dbt-run` which does: cd dbt && dbt run
      path: "{{ env_var('DBT_DUCKDB_PATH', '../data/marketlens.duckdb') }}"
      threads: 4
