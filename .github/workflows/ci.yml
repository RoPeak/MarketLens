name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # -------------------------------------------------------------------
      # Lint
      # -------------------------------------------------------------------
      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      # -------------------------------------------------------------------
      # Unit tests (no network)
      # -------------------------------------------------------------------
      - name: Test
        run: pytest tests/ -v --tb=short -m "not network"

      # -------------------------------------------------------------------
      # dbt compile — validates all SQL models without executing them.
      # DBT_DUCKDB_PATH points to /tmp so dbt-duckdb can create the file;
      # the data/ directory is not present in the CI workspace.
      # -------------------------------------------------------------------
      - name: dbt compile
        working-directory: dbt
        run: |
          dbt deps
          dbt compile
        env:
          DBT_DUCKDB_PATH: /tmp/ci_marketlens.duckdb
